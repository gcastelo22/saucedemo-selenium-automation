# Environment and Browser Configuration
conf {
  # Target URL for automation
  url = "https://www.saucedemo.com/"

  # Browser to be used: CHROME, FIREFOX or EDGE
  browser = "CHROME"

  # Global timeout for explicit waits (in seconds)
  timeout = 10

  # Run browser without GUI (true for CI/CD pipelines)
  headless = false
}

# User Credentials (to be used by Login Page)
user {
  standard {
    username = "standard_user"
    password = "secret_sauce"
  }
  locked {
    username = "locked_out_user"
    password = "secret_sauce"
  }
}